<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ProjectManager — Team Project & Task Management Platform</title>
    <meta
      name="description"
      content="ProjectManager is a full-stack project management platform with role-based teams, milestones, tasks & subtasks, audit trails, real-time notifications, calendar sync, and analytics dashboards."
    />
    <meta
      name="keywords"
      content="project management, task management, milestones, team collaboration, RBAC, dashboard, MERN, React, dependency graph"
    />
    <meta name="author" content="Akshat Darshi" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1a73e8" />

    <!-- Icons / PWA -->
    <link rel="icon" type="image/png" href="/SGC-logo.png" />

    <!-- Canonical (update to your deployed URL) -->

      name="twitter:description"
      content="Role-based teams, milestones, tasks & subtasks, audit trails, real-time notifications, calendar sync, and analytics dashboards."
